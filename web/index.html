<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AI Health Guardian is a responsive AI-powered health dashboard for tracking wellness, reports, symptoms, activity, and risk insights.">
  <meta name="theme-color" content="#0F766E">
  <meta name="robots" content="index,follow">

  <meta property="og:title" content="AI Health Guardian">
  <meta property="og:description" content="Responsive health monitoring with AI insights, reports, heart-risk tools, activity tracking, and wellness support.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="AI Health Guardian">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Health Guardian">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>AI Health Guardian</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      color-scheme: light;
      --bg-start: #031f24;
      --bg-mid: #0b4f53;
      --bg-end: #0f766e;
      --card-border: rgba(255, 255, 255, 0.18);
      --card-bg: rgba(255, 255, 255, 0.12);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.12), transparent 30%),
        linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
      color: white;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .shell {
      width: min(460px, calc(100vw - 32px));
      padding: 32px 28px;
      border-radius: 28px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    #loading-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      font-size: 42px;
      margin-bottom: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #loading-screen h1 {
      font-size: 30px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: 0.3px;
    }

    #loading-screen p {
      font-size: 15px;
      margin: 0 0 32px;
      opacity: 0.82;
      line-height: 1.5;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="shell">
      <div id="loading-icon">+</div>
      <h1>AI Health Guardian</h1>
      <p>Loading your responsive health workspace, AI insights, and personal dashboard.</p>
      <div class="spinner"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
        setTimeout(function() { loadingScreen.remove(); }, 600);
      }
    });
  </script>
</body>
</html>
